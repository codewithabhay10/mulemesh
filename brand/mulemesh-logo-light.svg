<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 12 330 63" width="660" height="126" role="img" aria-label="MuleMesh">
  <title>MuleMesh</title>
  <!-- Poster / white-background lockup: black "Mule", yellow "Mesh", no plate.
       Mark is black wires + a black hub ringed by six yellow accounts —
       fan-in on the left, fan-out on the right. Transparent background. -->

  <g transform="translate(0 10) scale(1.05)">
    <!-- the ring -->
    <path d="M32 10 51.05 21 51.05 43 32 54 12.95 43 12.95 21Z"
          fill="none" stroke="#111111" stroke-width="1.9" stroke-linejoin="round"/>
    <!-- the money: fan-in left, fan-out right -->
    <g stroke="#111111" stroke-width="2.5" stroke-linecap="round">
      <path d="M12.95 21 32 32"/>
      <path d="M12.95 43 32 32"/>
      <path d="M32 10 32 32"/>
      <path d="M32 54 32 32"/>
      <path d="M32 32 51.05 21"/>
      <path d="M32 32 51.05 43"/>
    </g>
    <!-- the accounts -->
    <circle cx="12.95" cy="21" r="4.5" fill="#ffc400"/>
    <circle cx="12.95" cy="43" r="4.5" fill="#ffc400"/>
    <circle cx="32" cy="10" r="4.5" fill="#ffc400"/>
    <circle cx="32" cy="54" r="4.5" fill="#ffc400"/>
    <circle cx="51.05" cy="21" r="4.5" fill="#ffc400"/>
    <circle cx="51.05" cy="43" r="4.5" fill="#ffc400"/>
    <!-- the mule hub -->
    <circle cx="32" cy="32" r="8.6" fill="#111111"/>
  </g>

  <text x="82" y="62"
        font-family="'Segoe UI Variable Display','Segoe UI',Inter,system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="52" font-weight="700" letter-spacing="-1.2"
        fill="#111111">Mule<tspan fill="#ffc400">Mesh</tspan></text>
</svg>
